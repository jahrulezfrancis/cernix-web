# Production Compose for Alibaba Cloud ECS.
# Invoke explicitly — never confuse with local docker-compose.yml:
#   docker compose --env-file .env.production -f compose.production.yml up -d
#
# Local development continues to use: docker compose up -d postgres
#
# Build web and the shared worker image sequentially, then start without builds:
#   docker compose --env-file .env.production -f compose.production.yml build web
#   docker compose --env-file .env.production -f compose.production.yml build migrate
#   docker compose --env-file .env.production -f compose.production.yml up -d --no-build
#
# Optional override for CI / smoke validation:
#   CERNIX_COMPOSE_ENV_FILE=.env.production.example docker compose --env-file ... -f compose.production.yml config

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

# Single shared worker/migrate image. Only `migrate` declares `build:` so Compose
# builds the worker target once; worker-* services reference the same image tag.
x-worker-image: &worker-image cernix-worker:prod

x-worker-common: &worker-common
  image: *worker-image
  restart: on-failure:5
  networks:
    - backend
  env_file:
    - ${CERNIX_COMPOSE_ENV_FILE:-.env.production}
  environment:
    NODE_ENV: production
    CERNIX_SKIP_LOCAL_ENV: "1"
    DATABASE_POOL_MAX: "2"
    NODE_OPTIONS: --max-old-space-size=128
    HOME: /tmp
  depends_on:
    postgres:
      condition: service_healthy
    migrate:
      condition: service_completed_successfully
  mem_limit: 160m
  cpus: "0.30"
  stop_grace_period: 45s
  security_opt:
    - no-new-privileges:true
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777
  logging: *default-logging

services:
  postgres:
    image: postgres:17.6-bookworm
    restart: unless-stopped
    networks:
      - backend
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - cernix_prod_postgres_data:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - shared_buffers=64MB
      - -c
      - max_connections=30
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - effective_cache_size=256MB
      - -c
      - wal_buffers=8MB
      - -c
      - checkpoint_completion_target=0.9
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    mem_limit: 256m
    cpus: "0.45"
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    # Port 5432 is intentionally NOT published.

  migrate:
    image: *worker-image
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    restart: "no"
    networks:
      - backend
    env_file:
      - ${CERNIX_COMPOSE_ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      CERNIX_SKIP_LOCAL_ENV: "1"
      DATABASE_POOL_MAX: "2"
      HOME: /tmp
    depends_on:
      postgres:
        condition: service_healthy
    command: ["node_modules/.bin/tsx", "server/db/migrate-cli.ts", "up"]
    mem_limit: 192m
    cpus: "0.25"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    logging: *default-logging

  web:
    image: cernix-web:prod
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    restart: on-failure:5
    networks:
      - edge
      - backend
    env_file:
      - ${CERNIX_COMPOSE_ENV_FILE:-.env.production}
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      DATABASE_POOL_MAX: "4"
      NODE_OPTIONS: --max-old-space-size=256
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    mem_limit: 384m
    cpus: "0.55"
    stop_grace_period: 25s
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    # Port 3000 is intentionally NOT published on the host.

  worker-snapshot:
    <<: *worker-common
    command: ["node_modules/.bin/tsx", "server/worker/run-snapshot-worker.ts"]
    environment:
      NODE_ENV: production
      CERNIX_SKIP_LOCAL_ENV: "1"
      DATABASE_POOL_MAX: "2"
      CERNIX_SNAPSHOT_WORKER_OWNER: ecs-snapshot-1
      NODE_OPTIONS: --max-old-space-size=128
      HOME: /tmp

  worker-planning:
    <<: *worker-common
    command: ["node_modules/.bin/tsx", "server/worker/run-planning-worker.ts"]
    environment:
      NODE_ENV: production
      CERNIX_SKIP_LOCAL_ENV: "1"
      DATABASE_POOL_MAX: "2"
      CERNIX_PLANNING_WORKER_OWNER: ecs-planning-1
      NODE_OPTIONS: --max-old-space-size=128
      HOME: /tmp

  worker-evidence:
    <<: *worker-common
    command: ["node_modules/.bin/tsx", "server/worker/run-evidence-worker.ts"]
    environment:
      NODE_ENV: production
      CERNIX_SKIP_LOCAL_ENV: "1"
      DATABASE_POOL_MAX: "2"
      CERNIX_EVIDENCE_WORKER_OWNER: ecs-evidence-1
      NODE_OPTIONS: --max-old-space-size=128
      HOME: /tmp

  worker-skeptic:
    <<: *worker-common
    command: ["node_modules/.bin/tsx", "server/worker/run-skeptic-worker.ts"]
    environment:
      NODE_ENV: production
      CERNIX_SKIP_LOCAL_ENV: "1"
      DATABASE_POOL_MAX: "2"
      CERNIX_SKEPTIC_WORKER_OWNER: ecs-skeptic-1
      NODE_OPTIONS: --max-old-space-size=128
      HOME: /tmp

  worker-judge:
    <<: *worker-common
    command: ["node_modules/.bin/tsx", "server/worker/run-judge-worker.ts"]
    environment:
      NODE_ENV: production
      CERNIX_SKIP_LOCAL_ENV: "1"
      DATABASE_POOL_MAX: "2"
      CERNIX_JUDGE_WORKER_OWNER: ecs-judge-1
      NODE_OPTIONS: --max-old-space-size=128
      HOME: /tmp

  nginx:
    image: nginx:1.27.5-alpine
    restart: unless-stopped
    networks:
      - edge
    depends_on:
      web:
        condition: service_healthy
    ports:
      # Default 80 for ECS. Local rootless Docker may need CERNIX_HTTP_PORT=8080.
      - "${CERNIX_HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/alibaba/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    mem_limit: 48m
    cpus: "0.15"
    stop_grace_period: 10s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=16m,mode=1777
      - /var/run:size=8m,mode=1777
      - /tmp:size=8m,mode=1777
    logging: *default-logging

networks:
  edge:
    driver: bridge
  backend:
    driver: bridge

volumes:
  cernix_prod_postgres_data:
