name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: cernix_ci
          POSTGRES_PASSWORD: cernix_ci
          POSTGRES_DB: cernix_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cernix_ci -d cernix_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Migrate database
        run: npm run db:migrate
        env:
          DATABASE_URL: postgresql://cernix_ci:cernix_ci@127.0.0.1:5432/cernix_test

      - name: Integration test
        run: npm run test:integration
        env:
          DATABASE_URL: postgresql://cernix_ci:cernix_ci@127.0.0.1:5432/cernix_test
          CERNIX_INTEGRATION_TEST_DATABASE: "1"

      - name: Build
        run: npm run build
