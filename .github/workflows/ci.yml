name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: cernix_ci
          POSTGRES_PASSWORD: cernix_ci
          POSTGRES_DB: cernix_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cernix_ci -d cernix_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Migrate database
        run: npm run db:migrate
        env:
          DATABASE_URL: postgresql://cernix_ci:cernix_ci@127.0.0.1:5432/cernix_test

      - name: Integration test
        run: npm run test:integration
        env:
          DATABASE_URL: postgresql://cernix_ci:cernix_ci@127.0.0.1:5432/cernix_test
          CERNIX_INTEGRATION_TEST_DATABASE: "1"

      - name: Build
        run: npm run build

  deployment:
    name: Deployment package
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Shell syntax for deploy scripts
        run: |
          bash -n deploy/alibaba/common.sh
          bash -n deploy/alibaba/deploy.sh
          bash -n deploy/alibaba/update.sh
          bash -n deploy/alibaba/verify.sh
          bash -n deploy/alibaba/smoke.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web image target
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: web
          push: false
          tags: cernix-web:ci
          cache-from: type=gha,scope=cernix-web
          cache-to: type=gha,mode=max,scope=cernix-web

      - name: Build worker image target
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: worker
          push: false
          tags: cernix-worker:ci
          cache-from: type=gha,scope=cernix-worker
          cache-to: type=gha,mode=max,scope=cernix-worker

      - name: Validate production Compose (dummy env, no secret echo)
        run: |
          sed \
            -e 's/replace_with_strong_value/CiComposePass_9x/g' \
            -e 's/replace_with_at_least_32_random_characters/CiComposeAuthSecret_at_least_32_chars/g' \
            -e 's/replace_with_github_oauth_client_id/ci_oauth_client_id/g' \
            -e 's/replace_with_github_oauth_client_secret/ci_oauth_client_secret/g' \
            -e 's/replace_with_dashscope_api_key/ci_qwen_key/g' \
            .env.production.example > /tmp/cernix-compose.env
          chmod 600 /tmp/cernix-compose.env
          export CERNIX_COMPOSE_ENV_FILE=/tmp/cernix-compose.env
          docker compose --env-file /tmp/cernix-compose.env -f compose.production.yml config --quiet
          rendered="$(docker compose --env-file /tmp/cernix-compose.env -f compose.production.yml config)"
          printf '%s\n' "$rendered" | grep -q 'caddy'
          ! printf '%s\n' "$rendered" | grep -E '^[[:space:]]*nginx:'
          printf '%s\n' "$rendered" | grep -E 'published: "?80"?|target: 80' >/dev/null
          printf '%s\n' "$rendered" | grep -E 'published: "?443"?|target: 443' >/dev/null
          ! printf '%s\n' "$rendered" | grep -E 'published: 3000|published: 5432'
          printf '%s\n' "$rendered" | grep -q 'cernix_caddy_data'
          printf '%s\n' "$rendered" | grep -q 'cernix-worker:prod'
          printf '%s\n' "$rendered" | grep -q 'on-failure'
          docker image inspect cernix-web:ci --format '{{.Config.User}}' | grep -qx 'cernix'
          docker image inspect cernix-worker:ci --format '{{.Config.User}}' | grep -qx 'cernix'
          # Secret scan of rendered config and deployment docs (no real credentials expected).
          ! printf '%s\n' "$rendered" | grep -Ei 'sk-[A-Za-z0-9]{10,}|ghp_[A-Za-z0-9]{10,}|CiComposePass'
          rm -f /tmp/cernix-compose.env

      - name: Assert build context excludes env files
        run: |
          tar --exclude-from=.dockerignore -cf /tmp/cernix-context.tar .
          ! tar -tf /tmp/cernix-context.tar | grep -E '(^|/)\.env($|\.local$|\.production$)'
          tar -tf /tmp/cernix-context.tar | grep -E '(^|/)\.env\.example$' >/dev/null
          rm -f /tmp/cernix-context.tar
