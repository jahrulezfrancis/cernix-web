worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
  worker_connections 256;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  server_tokens off;
  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 512k;
  client_header_buffer_size 4k;
  large_client_header_buffers 4 16k;

  # Docker embedded DNS — resolve web at request time so Compose restarts do not
  # crash Nginx during upstream static resolution at process start.
  resolver 127.0.0.11 valid=10s ipv6=off;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
  }

  server {
    listen 80;
    server_name _;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options SAMEORIGIN always;

    location = /nginx-health {
      access_log off;
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    location /api/health/ {
      set $cernix_web web:3000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 5s;
      proxy_send_timeout 15s;
      proxy_read_timeout 15s;
      proxy_pass http://$cernix_web;
    }

    # Investigation event polling is JSON over HTTP (not SSE); keep buffering on.
    location / {
      set $cernix_web web:3000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_connect_timeout 10s;
      proxy_send_timeout 120s;
      proxy_read_timeout 120s;
      proxy_buffering on;
      proxy_request_buffering on;
      proxy_pass http://$cernix_web;
    }
  }
}
